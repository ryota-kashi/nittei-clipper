<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FABプレビュー（content script確認用）</title>
<link rel="stylesheet" href="../content.css">
<style>
  body { font-family: sans-serif; background: #f8f9fa; padding: 40px; }
</style>
</head>
<body>
<h1>Googleカレンダー想定のダミーページ</h1>
<p>右下に日程クリッパーのフローティングボタンが表示されればOK。</p>
<script>
  // content scriptのchrome API呼び出しをスタブ化
  window.chrome = { runtime: { sendMessage: (m) => alert('sendMessage: ' + JSON.stringify(m)) } };
</script>
<script src="../content.js"></script>
</body>
</html>
